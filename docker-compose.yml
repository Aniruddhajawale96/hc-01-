version: '3.8'

services:
  # ── MongoDB ──
  mongodb:
    image: mongo:7
    container_name: hc01-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=hospital-queue
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (for scalability) ──
  redis:
    image: redis:7-alpine
    container_name: hc01-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend Server ──
  server:
    build:
      context: ./server
      dockerfile: ../docker/Dockerfile.server
    container_name: hc01-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/hospital-queue
      - AI_URL=http://ai:8001
      - CORS_ORIGIN=http://localhost:3000
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── AI Service ──
  ai:
    build:
      context: ./ai
      dockerfile: ../docker/Dockerfile.ai
    container_name: hc01-ai
    restart: unless-stopped
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Frontend (production build) ──
  client:
    build:
      context: ./client
      dockerfile: ../docker/Dockerfile.client
    container_name: hc01-client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - server

volumes:
  mongodb_data:
