version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: hospital-mongo-local
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - hospital-data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: hospital-queue

  mongo-express:
    image: mongo-express:1.0.2
    container_name: hospital-mongo-ui
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password123
      ME_CONFIG_MONGODB_URL: mongodb://admin:password123@mongodb:27017/
    depends_on:
      - mongodb

volumes:
  hospital-data:

